name: CI — Backend

on:
  push:
    paths:
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "app/**"
      - "requirements.txt"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff lint
        run: ruff check app/ --ignore E501,E402

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt mypy

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-namespace-packages || true
