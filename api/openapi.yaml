openapi: 3.1.0
info:
  title: Bilibili RAG 知识库系统
  description: 'B站收藏内容可检索知识库系统的 RESTful API 文档。


    ## Core capabilities


    1. **Data acquisition** — Bilibili QR login, favorite / video sync

    2. **Content extraction** — ASR, subtitles, AI summaries

    3. **Knowledge indexing** — Chunking, embedding, Milvus storage

    4. **Intelligent Q&A (RAG)** — Query routing, vector retrieval + LLM, SSE streaming


    ## Authentication


    **Credentials / Settings / Billing:** Require `Authorization: Bearer <token>` header

    (no `session_id` query param). Token is returned on login as `session_token`.


    **Other endpoints:** `Authorization: Bearer <token>` (recommended) or

    `?session_id=<uuid>` query parameter (legacy compat, will be removed).


    ## SSE streaming


    `/chat/ask/stream` returns Server-Sent Events:

    - `data: {"type":"chunk","content":"..."}`

    - `data: {"type":"sources","sources":[...]}`

    - `data: {"type":"error","message":"..."}`

    - `data: {"type":"done"}`

    '
  version: 0.1.0
