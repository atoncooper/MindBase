components:
  schemas:
    # ========== 认证相关 ==========
    QRCodeResponse:
      type: object
      required:
        - qrcode_key
        - qrcode_url
        - qrcode_image_base64
      properties:
        qrcode_key:
          type: string
          description: 二维码唯一标识
        qrcode_url:
          type: string
          description: 二维码链接
        qrcode_image_base64:
          type: string
          description: Base64 编码的二维码图片

    LoginStatusResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [waiting, scanned, confirmed, expired]
          description: 登录状态
        message:
          type: string
          description: 状态消息
        session_id:
          type: string
          description: 会话ID（登录成功时返回）
        user_info:
          $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      properties:
        mid:
          type: integer
          description: 用户ID
        uname:
          type: string
          description: 用户名
        face:
          type: string
          description: 头像URL
        level:
          type: integer
          description: 用户等级

    SessionInfo:
      type: object
      properties:
        valid:
          type: boolean
        user_info:
          $ref: '#/components/schemas/UserInfo'

    # ========== 对话相关 ==========
    ChatRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          description: 问题内容
          minLength: 1
        session_id:
          type: string
          description: 会话ID
        folder_ids:
          type: array
          items:
            type: integer
          description: 收藏夹ID列表

    ChatResponse:
      type: object
      properties:
        answer:
          type: string
          description: 回答内容
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
          description: 来源列表

    Source:
      type: object
      properties:
        bvid:
          type: string
          description: 视频BV号
        title:
          type: string
          description: 视频标题
        url:
          type: string
          description: 视频链接

    SearchResult:
      type: object
      properties:
        bvid:
          type: string
        title:
          type: string
        url:
          type: string
        content_preview:
          type: string

    # ========== 收藏夹相关 ==========
    FavoriteFolderInfo:
      type: object
      properties:
        media_id:
          type: integer
          description: 收藏夹ID
        title:
          type: string
          description: 收藏夹标题
        media_count:
          type: integer
          description: 视频数量
        is_selected:
          type: boolean
          description: 是否选中
        is_default:
          type: boolean
          description: 是否默认收藏夹

    FavoriteVideosResponse:
      type: object
      properties:
        folder_info:
          type: object
          properties:
            title:
              type: string
            media_count:
              type: integer
        videos:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteVideoItem'
        has_more:
          type: boolean
        page:
          type: integer
        page_size:
          type: integer

    FavoriteVideoItem:
      type: object
      properties:
        bvid:
          type: string
        title:
          type: string
        cover:
          type: string
        duration:
          type: string
        owner:
          type: string
        play_count:
          type: integer
        intro:
          type: string
        is_selected:
          type: boolean

    VideoInfo:
      type: object
      properties:
        bvid:
          type: string
        title:
          type: string
        cover:
          type: string
        duration:
          type: string
        owner:
          type: string
        cid:
          type: integer
          description: 视频CID（用于ASR）

    OrganizePreviewRequest:
      type: object
      required:
        - folder_id
      properties:
        folder_id:
          type: integer
          description: 默认收藏夹ID

    OrganizePreviewResponse:
      type: object
      properties:
        default_folder_id:
          type: integer
        default_folder_title:
          type: string
        folders:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteFolderInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrganizePreviewItem'
        stats:
          type: object
          properties:
            total:
              type: integer
            matched:
              type: integer
            unmatched:
              type: integer

    OrganizePreviewItem:
      type: object
      properties:
        bvid:
          type: string
        title:
          type: string
        resource_id:
          type: integer
        resource_type:
          type: integer
        target_folder_id:
          type: integer
          nullable: true
        target_folder_title:
          type: string
        reason:
          type: string
          nullable: true

    OrganizeExecuteRequest:
      type: object
      required:
        - default_folder_id
        - moves
      properties:
        default_folder_id:
          type: integer
        moves:
          type: array
          items:
            $ref: '#/components/schemas/OrganizeMoveItem'

    OrganizeMoveItem:
      type: object
      properties:
        resource_id:
          type: integer
        resource_type:
          type: integer
        target_folder_id:
          type: integer

    CleanInvalidRequest:
      type: object
      required:
        - folder_id
      properties:
        folder_id:
          type: integer

    # ========== 知识库相关 ==========
    KnowledgeStats:
      type: object
      properties:
        total_chunks:
          type: integer
        total_videos:
          type: integer
        collection_name:
          type: string

    FolderStatus:
      type: object
      properties:
        media_id:
          type: integer
        indexed_count:
          type: integer
        media_count:
          type: integer
          nullable: true
        last_sync_at:
          type: string
          format: date-time
          nullable: true

    SyncRequest:
      type: object
      properties:
        folder_ids:
          type: array
          items:
            type: integer
          description: 收藏夹ID列表（为空则同步所有）

    SyncResult:
      type: object
      properties:
        folder_id:
          type: integer
        total:
          type: integer
        added:
          type: integer
        removed:
          type: integer
        indexed:
          type: integer
        message:
          type: string
        last_sync_at:
          type: string
          format: date-time
          nullable: true

    BuildRequest:
      type: object
      required:
        - folder_ids
      properties:
        folder_ids:
          type: array
          items:
            type: integer
          description: 要处理的收藏夹ID列表
        exclude_bvids:
          type: array
          items:
            type: string
          description: 排除的视频BV号

    BuildStatus:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        current_step:
          type: string
        total_videos:
          type: integer
        processed_videos:
          type: integer
        message:
          type: string

    # ========== ASR 分P ==========
    ASRCreateRequest:
      type: object
      required:
        - bvid
        - cid
      properties:
        bvid:
          type: string
          description: 视频BV号
        cid:
          type: integer
          description: 分P的CID
        page_index:
          type: integer
          description: P序号（0-based）
          default: 0
        page_title:
          type: string
          description: 分P标题
          nullable: true

    ASRUpdateRequest:
      type: object
      required:
        - bvid
        - cid
        - page_index
        - content
      properties:
        bvid:
          type: string
        cid:
          type: integer
        page_index:
          type: integer
        content:
          type: string
          description: 手动编辑的ASR内容

    ASRReASRRequest:
      type: object
      required:
        - bvid
        - cid
        - page_index
      properties:
        bvid:
          type: string
        cid:
          type: integer
        page_index:
          type: integer

    ASRContentResponse:
      type: object
      required:
        - exists
      properties:
        exists:
          type: boolean
          description: 是否存在ASR记录
        bvid:
          type: string
          nullable: true
        cid:
          type: integer
          nullable: true
        page_index:
          type: integer
          nullable: true
        page_title:
          type: string
          nullable: true
        content:
          type: string
          description: ASR转写全文
          nullable: true
        content_source:
          type: string
          description: 内容来源（asr / user_edit）
          nullable: true
        version:
          type: integer
          nullable: true
        is_processed:
          type: boolean
          nullable: true

    ASRTaskStatus:
      type: object
      required:
        - task_id
        - status
        - progress
        - message
      properties:
        task_id:
          type: string
        status:
          type: string
          enum: [pending, processing, done, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        message:
          type: string

    VideoPageVersionInfo:
      type: object
      required:
        - version
        - content_source
        - content_preview
        - is_latest
      properties:
        version:
          type: integer
        content_source:
          type: string
        content_preview:
          type: string
        is_latest:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ========== 分P向量化 ==========
    VectorPageStatusResponse:
      type: object
      required:
        - exists
        - is_processed
        - is_vectorized
        - vector_chunk_count
        - chroma_exists
      properties:
        exists:
          type: boolean
          description: 是否存在VideoPage记录
        bvid:
          type: string
          nullable: true
        cid:
          type: integer
          nullable: true
        page_index:
          type: integer
          nullable: true
        page_title:
          type: string
          nullable: true
        is_processed:
          type: boolean
          description: ASR是否完成
        content_preview:
          type: string
          description: 内容预览（前200字符）
          nullable: true
        is_vectorized:
          type: string
          enum: [pending, processing, done, failed]
          description: 向量化状态
        vectorized_at:
          type: string
          format: date-time
          nullable: true
        vector_chunk_count:
          type: integer
          default: 0
        vector_error:
          type: string
          nullable: true
        chroma_exists:
          type: boolean
          description: ChromaDB中是否实际存在向量
        steps:
          type: array
          items:
            type: object
          nullable: true
          description: 子步骤状态

    VectorPageTaskStatus:
      type: object
      required:
        - task_id
        - status
        - progress
        - message
      properties:
        task_id:
          type: string
        status:
          type: string
          enum: [pending, processing, done, failed]
        progress:
          type: integer
        message:
          type: string
        steps:
          type: array
          items:
            type: object
          nullable: true
        result:
          type: object
          nullable: true
        error:
          type: string
          nullable: true

    VectorPageCreateRequest:
      type: object
      required:
        - bvid
        - cid
      properties:
        bvid:
          type: string
        cid:
          type: integer
        page_index:
          type: integer
          default: 0
        page_title:
          type: string
          nullable: true

    VectorPageReVectorRequest:
      type: object
      required:
        - bvid
        - cid
      properties:
        bvid:
          type: string
        cid:
          type: integer

    # ========== Common ==========
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string

    # ========== User center ==========
    UserInfoResponse:
      type: object
      properties:
        uid:
          type: integer
        nickname:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        status:
          type: string
        roles:
          type: array
          items:
            type: string
        primary_oauth:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    TokenResponse:
      type: object
      properties:
        session_token:
          type: string
        token_type:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        user_info:
          $ref: '#/components/schemas/UserInfoResponse'

    # ========== Chat (extended) ==========
    AgenticChatRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
        session_id:
          type: string
        folder_ids:
          type: array
          items:
            type: integer
        top_k:
          type: integer
          default: 5
        max_hops:
          type: integer
          default: 3

    AgenticChatResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        reasoning_steps:
          type: array
          items:
            $ref: '#/components/schemas/ReasoningStep'
        synthesis_method:
          type: string
        hops_used:
          type: integer
        avg_recall_score:
          type: number

    ReasoningStep:
      type: object
      properties:
        step:
          type: integer
        action:
          type: string
        query:
          type: string
        reasoning:
          type: string
        verdict:
          type: string
          nullable: true
        recall_score:
          type: number
          nullable: true
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        content_preview:
          type: string

    ChatSessionCreateRequest:
      type: object
      properties:
        session_id:
          type: string
        title:
          type: string

    ChatSessionUpdateRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string

    ChatSessionResponse:
      type: object
      properties:
        id:
          type: integer
        chat_session_id:
          type: string
        session_id:
          type: string
        title:
          type: string
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time
          nullable: true

    ChatSessionListResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/ChatSessionResponse'

    ChatMessageResponse:
      type: object
      properties:
        id:
          type: integer
        chat_session_id:
          type: string
        role:
          type: string
        content:
          type: string
        status:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        tokens_used:
          type: integer
          nullable: true
        model:
          type: string
          nullable: true
        latency_ms:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    ChatHistoryResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessageResponse'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean

    # ========== Knowledge (extended) ==========
    VideoPageInfo:
      type: object
      properties:
        cid:
          type: integer
        page:
          type: integer
        title:
          type: string
        duration:
          type: integer

    VideoPagesResponse:
      type: object
      properties:
        bvid:
          type: string
        title:
          type: string
        pages:
          type: array
          items:
            $ref: '#/components/schemas/VideoPageInfo'
        page_count:
          type: integer

    # ========== Credentials ==========
    CredentialCreate:
      type: object
      required:
        - name
        - provider
        - api_key
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [openai, anthropic, deepseek, custom]
        api_key:
          type: string
        base_url:
          type: string
        default_model:
          type: string
        is_default:
          type: boolean
          default: false

    CredentialUpdate:
      type: object
      properties:
        name:
          type: string
        api_key:
          type: string
        base_url:
          type: string
        default_model:
          type: string
        is_default:
          type: boolean

    CredentialResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        provider:
          type: string
        masked_key:
          type: string
        base_url:
          type: string
          nullable: true
        default_model:
          type: string
          nullable: true
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ========== Settings ==========
    ApiKeySetRequest:
      type: object
      properties:
        llm_api_key:
          type: string
        llm_base_url:
          type: string
        llm_model:
          type: string
        embedding_api_key:
          type: string
        embedding_base_url:
          type: string
        embedding_model:
          type: string
        asr_api_key:
          type: string
        asr_base_url:
          type: string
        asr_model:
          type: string

    ApiKeyStatusResponse:
      type: object
      properties:
        llm_is_configured:
          type: boolean
        llm_masked_key:
          type: string
          nullable: true
        llm_base_url:
          type: string
          nullable: true
        llm_model:
          type: string
          nullable: true
        embedding_is_configured:
          type: boolean
        embedding_masked_key:
          type: string
          nullable: true
        embedding_base_url:
          type: string
          nullable: true
        embedding_model:
          type: string
          nullable: true
        asr_is_configured:
          type: boolean
        asr_masked_key:
          type: string
          nullable: true
        asr_base_url:
          type: string
          nullable: true
        asr_model:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    # ========== Billing ==========
    UsageSummary:
      type: object
      properties:
        total_tokens:
          type: integer
        total_api_calls:
          type: integer
        by_provider:
          type: array
          items:
            $ref: '#/components/schemas/ProviderUsage'
        by_credential:
          type: array
          items:
            $ref: '#/components/schemas/CredentialUsageItem'

    ProviderUsage:
      type: object
      properties:
        provider:
          type: string
        total_tokens:
          type: integer
        api_calls:
          type: integer
        cost_estimate:
          type: number

    CredentialUsageItem:
      type: object
      properties:
        credential_id:
          type: integer
          nullable: true
        name:
          type: string
        provider:
          type: string
        total_tokens:
          type: integer
        api_calls:
          type: integer
        cost_estimate:
          type: number

    # ========== Quiz ==========
    QuizGenerateRequest:
      type: object
      properties:
        folder_ids:
          type: array
          items:
            type: integer
        pages:
          type: array
          items:
            type: object
        question_count:
          type: integer
          default: 10
        difficulty:
          type: string
          enum: [easy, medium, hard]
          default: medium
        title:
          type: string

    QuizGenerateResponse:
      type: object
      properties:
        quiz_uuid:
          type: string
        question_count:
          type: integer
        estimated_cost_tokens:
          type: integer

    QuizSetResponse:
      type: object
      properties:
        quiz_uuid:
          type: string
        title:
          type: string
        status:
          type: string
        question_count:
          type: integer
        type_distribution:
          type: object
          nullable: true
        difficulty:
          type: string
        total_score:
          type: integer
        passing_score:
          type: integer
        created_at:
          type: string
          format: date-time
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestionResponse'

    QuizQuestionResponse:
      type: object
      properties:
        question_uuid:
          type: string
        question_type:
          type: string
        difficulty:
          type: string
        question_text:
          type: string
        options:
          type: array
          items:
            type: string
          nullable: true

    QuizSubmissionRequest:
      type: object
      required:
        - quiz_uuid
        - answers
      properties:
        quiz_uuid:
          type: string
        answers:
          type: array
          items:
            $ref: '#/components/schemas/QuizAnswerItem'
        time_spent_seconds:
          type: integer
          nullable: true

    QuizAnswerItem:
      type: object
      required:
        - question_uuid
        - answer
      properties:
        question_uuid:
          type: string
        answer:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    QuizSubmissionResponse:
      type: object
      properties:
        submission_uuid:
          type: string
        score:
          type: integer
          nullable: true
        passed:
          type: boolean
          nullable: true
        correct_count:
          type: integer
        total_count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/QuizAnswerResult'

    QuizAnswerResult:
      type: object
      properties:
        question_uuid:
          type: string
        is_correct:
          type: boolean
          nullable: true
        auto_score:
          type: integer
          nullable: true
        correct_answer: {}
        grading_note:
          type: string
          nullable: true

    QuizHistoryResponse:
      type: object
      properties:
        submissions:
          type: array
          items:
            $ref: '#/components/schemas/QuizHistoryItem'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean

    QuizHistoryItem:
      type: object
      properties:
        submission_uuid:
          type: string
        quiz_uuid:
          type: string
        title:
          type: string
        score:
          type: integer
          nullable: true
        passed:
          type: boolean
          nullable: true
        correct_count:
          type: integer
        total_question_count:
          type: integer
        time_spent_seconds:
          type: integer
          nullable: true
        submitted_at:
          type: string

    WrongAnswerResponse:
      type: object
      properties:
        wrong_answers:
          type: array
          items:
            $ref: '#/components/schemas/WrongAnswerItem'
        total:
          type: integer

    WrongAnswerItem:
      type: object
      properties:
        question_uuid:
          type: string
        quiz_uuid:
          type: string
        question_type:
          type: string
        question_text:
          type: string
        options:
          type: array
          items:
            type: string
          nullable: true
        user_answer: {}
        correct_answer: {}
        explanation:
          type: string
          nullable: true
        times_wrong:
          type: integer
        last_attempt_at:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  responses:
    Unauthorized:
      description: Token is missing, expired, or revoked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
