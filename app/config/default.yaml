# ============================================================
# MindBase — default configuration
# ============================================================
# This file is committed as live documentation and fallback defaults.
#
# Merge order (later overrides earlier):
#   1. Pydantic field defaults
#   2. app/config/default.yaml      ← this file
#   3. app/config/config.yaml       ← team-shared overrides (optional, committed)
#   4. app/config/local.yaml        ← personal overrides (git-ignored, optional)
#   5. Environment variables        ← highest priority; use for secrets
#
# Conventions:
#   - All keys lowercase, underscore-separated
#   - Secrets (api_key / secret / password) MUST NOT go in YAML; env only
#   - Nested env vars use double-underscore: LLM__API_KEY → llm.api_key
#   - Booleans: true / false (lowercase). PyYAML StrictBoolSafeLoader used
#     so yes/no/on/off are NOT coerced to bool.
# ============================================================


# ---- App ----------------------------------------------------------
app:
  name: MindBase
  env: dev
  debug: false
  log_level: INFO                     # DEBUG | INFO | WARNING | ERROR | CRITICAL
  timezone: Asia/Shanghai


server:
  host: 0.0.0.0
  port: 8000
  workers: 4
  reload: false                       # set true in config.yaml for dev
  # HTTPS — set both certfile and keyfile to enable TLS
  ssl_certfile: ""                    # /etc/ssl/certs/mind-base.pem
  ssl_keyfile: ""                     # /etc/ssl/private/mind-base.key
  # Set to true when behind a reverse proxy (nginx/Caddy) that handles TLS
  proxy_headers: true                 # trust X-Forwarded-* headers


# ---- Relational database ------------------------------------------
rdbms:
  url: ""                               # inject via RDBMS__URL env var
  echo: true                          # log all SQL (dev-friendly)
  pool_size: 20
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 1800                  # max connection lifetime (seconds)


# ---- Milvus (vector store) ----------------------------------------
# Start: docker run -d --name milvus-standalone \
#          -p 19530:19530 -p 9091:9091 milvusdb/milvus:latest
milvus:
  enabled: true
  uri: ""                               # inject via MILVUS__URI env var
  token: ""
  db_name: MindBase
  collection_name: bilibili_videos
  cloud_collection_name: cloud_drive
  dimension: 1536
  index_type: IVF_FLAT
  metric_type: COSINE
  nlist: 1024
  nprobe: 16


# ---- MongoDB (document store) -------------------------------------
# Collections: operation_log, chat_messages, quiz_questions, quiz_answers
mongo:
  enabled: true
  uri: ""                               # inject via MONGO__URI env var
  db_name: MindBase
  max_pool_size: 100
  min_pool_size: 10
  server_selection_timeout_ms: 5000
  connect_timeout_ms: 10000


# ---- Redis (cache + streams + distributed lock) -------------------
redis:
  enabled: true
  url: ""                               # inject via REDIS__URL env var
  max_connections: 50
  socket_timeout: 5
  socket_connect_timeout: 5
  health_check_interval: 30
  key_prefix: "mind-base:"


# ---- MinIO / S3 (object storage) ----------------------------------
minio:
  enabled: false
  endpoint: http://localhost:9000
  region: us-east-1
  bucket: drive-videos
  secure: false                       # set true in production (HTTPS)
  presign_expire: 3600
  public_endpoint: ""                 # public-facing URL for presigned links, e.g. https://example.com/minio-proxy
  # access_key / secret_key via env: MINIO__ACCESS_KEY, MINIO__SECRET_KEY


# ---- Message queue — Celery + Redis Streams -----------------------
mq:
  enabled: false
  broker: redis://localhost:6379/1
  backend: redis://localhost:6379/2
  task_time_limit: 1800               # hard timeout (seconds)
  task_soft_time_limit: 1500          # soft timeout (seconds)
  task_acks_late: true                # ack after task completes
  worker_prefetch: 1
  result_expires: 86400               # result TTL (seconds)
  stream_maxlen: 10000
  stream_block_ms: 5000
  rabbitmq_url: ""                    # set to switch broker to RabbitMQ


# ---- LLM (OpenAI-compatible; currently Aliyun DashScope) ----------
llm:
  provider: dashscope                 # dashscope | openai | anthropic | custom
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen3-max
  eval_model: gpt-4o-mini             # auxiliary model for eval / quiz generation
  timeout: 60
  max_retries: 3
  # api_key via env: LLM__API_KEY (legacy: DASHSCOPE_API_KEY, OPENAI_API_KEY)


# ---- Embedding ----------------------------------------------------
embedding:
  model: text-embedding-v4            # DashScope, 1536-dim
  batch_size: 100
  dimension: 1536
  version: v1                         # bump when changing chunk strategy or model


# ---- Text chunking (rule-based) -----------------------------------
chunk:
  target_size: 750
  min_size: 300
  max_size: 900
  overlap: 100


# ---- Agentic RAG (multi-hop reasoning) ---------------------------
agentic:
  top_k: 5
  max_hops: 3


# ---- ASR — DashScope speech-to-text ------------------------------
asr:
  provider: dashscope                 # dashscope | whisper | funasr
  base_url: https://dashscope.aliyuncs.com/api/v1
  model: paraformer-v2                # offline model
  model_local: paraformer-realtime-v2 # streaming model
  input_format: pcm
  timeout: 600                        # per-task timeout (seconds)
  # api_key via env: ASR__API_KEY; falls back to LLM__API_KEY


# ---- LangSmith tracing --------------------------------------------
# Set enabled=true + LANGSMITH__API_KEY env var to activate.
langsmith:
  enabled: true
  project: MindBase
  endpoint: https://api.smith.langchain.com
  tracing_v2: true                    # LANGCHAIN_TRACING_V2 compat
  tracing: true                       # LANGSMITH_TRACING compat
  # api_key via env: LANGSMITH__API_KEY


# ---- Session ------------------------------------------------------
session:
  ttl_days: 30
  # secret via env: SESSION__SECRET


# ---- Security — user API key encryption ---------------------------
# encryption_key is a 32-byte base64-encoded string for AES-GCM
# encryption of stored provider API keys. Set via env only:
#   SECURITY__API_KEY_ENCRYPTION_KEY
# WARNING: never change this key after deployment — historical data
# becomes undecryptable.
# Generate: python -c "import base64,os; print(base64.b64encode(os.urandom(32)).decode())"
security:
  # Plan 0028: per-endpoint rate limits + login cooldown.
  # All windows are seconds. Override via env:
  #   SECURITY__RATE_LIMIT__LOGIN__IP_MAX=20
  rate_limit:
    login:
      ip_max: 10            # per-IP max attempts per window
      ip_window: 60         # 60s
      email_max: 5          # per-email max attempts per window
      email_window: 300     # 5 minutes
      cooldown_threshold: 5 # failed attempts before cooldown kicks in
      cooldown_seconds: 900 # 15 minutes
    password_reset_request:
      ip_max: 5
      ip_window: 3600       # per-IP per hour
      email_max: 3
      email_window: 3600
    password_reset:
      ip_max: 10
      ip_window: 3600
    email_send_code:
      ip_max: 10
      ip_window: 60
      uid_max: 5
      uid_window: 600       # 10 minutes
    change_password:
      uid_max: 3
      uid_window: 3600
    email_verify:
      ip_max: 20
      ip_window: 60


# ---- Email (verification + password reset) ------------------------
# Uses Resend (https://resend.com). Free tier: 100 emails/day.
#   1. Sign up at resend.com, create API key
#   2. (Optional) verify your domain to send from your address
#   3. For quick testing without domain setup, use the shared address:
#      from_email: "MindBase <onboarding@resend.dev>"
# api_key via env: EMAIL__API_KEY
email:
  enabled: false                    # set true once API key is configured
  api_key: ""                       # inject via EMAIL__API_KEY
  from_email: "MindBase <onboarding@resend.dev>"
  frontend_url: "http://localhost:3000"  # for reset password link
  code_ttl_seconds: 300             # 5 minutes
  code_length: 6                    # 6-digit numeric
  rate_limit_target_seconds: 60     # min interval between sends to same target
  rate_limit_uid_minutes: 10        # window for per-uid send count
  rate_limit_uid_max: 5             # max sends per uid in window
  max_verify_attempts: 5            # wrong code attempts before code is voided


# ---- Rate limiting ------------------------------------------------
ratelimit:
  chat_per_minute: 60
  asr_per_hour: 100
  quiz_per_day: 50


# ---- Slow SQL capture ---------------------------------------------
# Threshold adapts per dialect: SQLite→100ms, PostgreSQL→50ms.
# Override via env: SLOW_SQL__THRESHOLD_MS
slow_sql:
  enabled: true
  threshold_ms: 100
  max_samples_per_fingerprint: 3
  retention_days: 7
  log_to_console: true
  log_to_storage: true


# ---- Transaction defaults -----------------------------------------
# retry_delay_base in seconds; exponential backoff doubles each
# attempt (0.1, 0.2, 0.4, …).
transaction:
  max_retries: 3
  retry_delay_base: 0.1
  readonly_hint: false


# ---- Quiz AI governance -------------------------------------------
# Per-uid daily quotas. Redis must be enabled for enforcement; when
# Redis is unavailable the quota check fails open (no blocking).
quiz:
  limits:
    generate: 5    # quiz sets generated per uid per day
    grade: 20      # submissions graded per uid per day
  # Task queue engine for quiz generation.
  # background = FastAPI BackgroundTasks (in-process, lost on restart)
  # rq / celery = external queue (not yet implemented, falls back to background)
  queue:
    engine: background
