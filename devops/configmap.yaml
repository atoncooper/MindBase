apiVersion: v1
kind: ConfigMap
metadata:
  name: mind-base-config
  namespace: mind-base
  labels:
    app.kubernetes.io/name: mind-base
data:
  # App
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  DEBUG: "false"
  # Database
  DATABASE_URL: "sqlite+aiosqlite:///./data/mind_base.db"
  # LLM
  OPENAI_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  LLM_MODEL: "qwen3-max"
  EMBEDDING_MODEL: "text-embedding-v4"
  # ASR
  DASHSCOPE_BASE_URL: "https://dashscope.aliyuncs.com/api/v1"
  ASR_MODEL: "paraformer-v2"
  # LangSmith
  LANGCHAIN_TRACING_V2: "false"
  LANGSMITH_TRACING: "false"
  LANGSMITH_PROJECT: "mind-base"
  LANGSMITH_ENDPOINT: "https://api.smith.langchain.com"
  # Chunking
  CHUNK_TARGET_SIZE: "750"
  CHUNK_MIN_SIZE: "300"
  CHUNK_MAX_SIZE: "900"
  CHUNK_OVERLAP: "100"
  EMBEDDING_VERSION: "v1"
  # Frontend
  NEXT_PUBLIC_API_URL: "http://mind-base-backend:8000"
