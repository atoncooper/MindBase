# ================================================================
# Bilibili RAG — full-stack development / deployment
# ================================================================
# App only (external DB): docker compose --profile standalone up -d
# App + infra:             docker compose up -d
# App + infra + Milvus:    docker compose --profile storage up -d
# Everything:              docker compose --profile full up -d

services:
  # ==============================================================
  # Application
  # ==============================================================

  backend:
    profiles: ["", "standalone", "storage", "full"]
    image: ${BACKEND_IMAGE:-ghcr.io/atoncooper/bilirag-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bilirag-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    env_file:
      - .env
    environment:
      # App
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      # RDBMS — override via .env for external DB
      - RDBMS__URL=${RDBMS__URL:-mysql+aiomysql://bilirag:bilirag@mysql:3306/bilirag}
      # Milvus — override via .env for external Milvus
      - MILVUS__URI=${MILVUS__URI:-http://milvus:19530}
      - MILVUS__TOKEN=${MILVUS__TOKEN:-}
      # MongoDB — override via .env for external Mongo
      - MONGO__URI=${MONGO__URI:-mongodb://admin:bilirag@mongo:27017/?authSource=admin}
      # Redis — override via .env for external Redis
      - REDIS__URL=${REDIS__URL:-redis://:bilirag@redis:6379/1}
      # LLM
      - LLM__API_KEY=${LLM_API_KEY}
      - LLM__BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM__MODEL=${LLM_MODEL:-qwen3-max}
      # Embedding
      - EMBEDDING__MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      - EMBEDDING__DIMENSION=${EMBEDDING_DIMENSION:-1536}
      # ASR
      - ASR__API_KEY=${ASR_API_KEY:-}
      - ASR__BASE_URL=${ASR_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      - ASR__MODEL=${ASR_MODEL:-paraformer-v2}
      # LangSmith
      - LANGSMITH__API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH__PROJECT=${LANGSMITH_PROJECT:-bilibili-rag}
      # Session
      - SESSION__SECRET=${SESSION_SECRET}
      # Security
      - SECURITY__API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY}
      # Plan 0021: MinIO object storage
      - MINIO__ENABLED=${MINIO__ENABLED:-true}
      - MINIO__ENDPOINT=${MINIO__ENDPOINT:-http://minio:9000}
      - MINIO__ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO__SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO__BUCKET=${MINIO_BUCKET:-drive-videos}
      - MINIO__REGION=${MINIO_REGION:-us-east-1}
      - MINIO__SECURE=${MINIO_SECURE:-false}
      - MINIO__PUBLIC_ENDPOINT=${MINIO__PUBLIC_ENDPOINT:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - bilirag-net

  frontend:
    profiles: ["", "standalone", "storage", "full"]
    image: ${FRONTEND_IMAGE:-ghcr.io/atoncooper/bilirag-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bilirag-frontend
    # Port exposed only for direct debugging; in production nginx handles all traffic
    # ports:
    #   - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bilirag-net

  # ==============================================================
  # Reverse Proxy (Nginx) — SSL termination + routing
  # ==============================================================

  nginx:
    profiles: ["", "standalone", "storage", "full"]
    image: nginx:alpine
    container_name: bilirag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot
      - nginx_video_cache:/var/cache/nginx/video   # Plan 0021
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bilirag-net

  # ==============================================================
  # Infrastructure
  # ==============================================================

  mysql:
    image: mysql:8.4
    container_name: bilirag-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123}
      - MYSQL_DATABASE=bilirag
      - MYSQL_USER=${MYSQL_USER:-bilirag}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-bilirag}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./app/system.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bilirag-net

  redis:
    image: redis:7-alpine
    container_name: bilirag-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-bilirag}
      --notify-keyspace-events Ex
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bilirag}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bilirag-net

  mongo:
    image: mongo:7
    container_name: bilirag-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-bilirag}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bilirag-net

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: bilirag-milvus
    profiles: ["storage", "full"]
    command: milvus run standalone
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_GRPC_PORT:-9091}:9091"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bilirag-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: bilirag-etcd
    profiles: ["storage", "full"]
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      -data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bilirag-net

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: bilirag-minio
    profiles: ["storage", "full"]
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      # Plan 0021: Redis event notification + abandoned upload cleanup
      - MINIO_NOTIFY_REDIS_ENABLE_clouddrive=on
      - MINIO_NOTIFY_REDIS_FORMAT_clouddrive=access
      - MINIO_NOTIFY_REDIS_ADDRESS_clouddrive=redis:6379
      - MINIO_NOTIFY_REDIS_PASSWORD_clouddrive=${REDIS_PASSWORD:-bilirag}
      - MINIO_NOTIFY_REDIS_KEY_clouddrive=minio:events:clouddrive
      - MINIO_NOTIFY_REDIS_EVENTS_clouddrive=put,delete,completemultipartupload
      - MINIO_API_ABORT_INCOMPLETE_MULTIPART_UPLOAD_DAYS=1
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bilirag-net

  # ==============================================================
  # Optional tools
  # ==============================================================

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bilirag-redis-ui
    profiles: ["tools", "full"]
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-bilirag}
    restart: unless-stopped
    networks:
      - bilirag-net

  mongo-express:
    image: mongo-express:latest
    container_name: bilirag-mongo-ui
    profiles: ["tools", "full"]
    ports:
      - "${MONGO_UI_PORT:-8082}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD:-bilirag}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-bilirag}@mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    restart: unless-stopped
    networks:
      - bilirag-net

volumes:
  backend_data:
  backend_logs:
  mysql_data:
  redis_data:
  mongo_data:
  milvus_data:
  etcd_data:
  minio_data:
  certbot_www:
  nginx_video_cache:       # Plan 0021: video streaming cache

networks:
  bilirag-net:
    driver: bridge
