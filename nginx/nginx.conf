worker_processes auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # ---- Gzip ----
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;
    gzip_proxied    any;
    gzip_vary       on;

    # ---- Plan 0021: Video streaming cache ----
    proxy_cache_path /var/cache/nginx/video
        levels=1:2
        keys_zone=video_cache:512m
        max_size=50g
        inactive=7d
        use_temp_path=off;

    # ---- Upstreams ----
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ---- HTTP → HTTPS redirect ----
    server {
        listen       80;
        server_name  _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS main server ----
    server {
        listen       443 ssl;
        http2        on;
        server_name  _;

        # ---- SSL ----
        ssl_certificate       /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key   /etc/nginx/certs/privkey.pem;
        ssl_protocols         TLSv1.2 TLSv1.3;
        ssl_ciphers           ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache     shared:SSL:10m;
        ssl_session_timeout   10m;

        # ---- Security headers ----
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-Frame-Options           "SAMEORIGIN"      always;
        add_header X-XSS-Protection          "0"               always;

        # ---- Common proxy settings ----
        proxy_http_version      1.1;
        proxy_set_header        Host                $host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   $scheme;
        proxy_set_header        X-Forwarded-Host    $host;
        proxy_set_header        X-Forwarded-Port    $server_port;

        proxy_connect_timeout   75s;
        proxy_read_timeout      300s;  # SSE / streaming
        proxy_buffering         off;   # disable buffering for SSE
        proxy_cache             off;

        client_max_body_size    50m;

        # ============================================================
        # Backend API routes
        # ============================================================

        location /auth        { proxy_pass http://backend; }
        location /chat        { proxy_pass http://backend; }
        location /favorites   { proxy_pass http://backend; }
        location /knowledge   { proxy_pass http://backend; }
        location /asr         { proxy_pass http://backend; }
        location /vec         { proxy_pass http://backend; }
        location /credentials { proxy_pass http://backend; }
        location /settings    { proxy_pass http://backend; }
        location /billing     { proxy_pass http://backend; }
        location /quiz        { proxy_pass http://backend; }
        location /health      { proxy_pass http://backend; }
        location /docs        { proxy_pass http://backend; }

        # ---- Plan 0021: Cloud drive video streaming (internal redirect to MinIO) ----
        location /cloud/video/ {
            internal;
            rewrite ^/cloud/video/(.*) /$1 break;
            proxy_pass http://minio:9000;
            proxy_cache video_cache;
            proxy_cache_key "$uri";
            proxy_cache_valid 200 24h;
            proxy_cache_valid 206 24h;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_cache_revalidate on;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 100 1m;
            proxy_max_temp_file_size 2048m;
            proxy_set_header Host minio:9000;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
        }

        # ---- Plan 0021: Cloud drive API ----
        location /cloud/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /openapi.json { proxy_pass http://backend; }
        location /cache       { proxy_pass http://backend; }

        # ---- WebSocket for task notifications ----
        location /ws {
            proxy_pass            http://backend;
            proxy_set_header      Upgrade           $http_upgrade;
            proxy_set_header      Connection        "upgrade";
            proxy_read_timeout    86400s;
        }

        # ============================================================
        # Frontend
        # ============================================================

        # Next.js static assets (long cache)
        location /_next/static {
            proxy_pass          http://frontend;
            expires             1y;
            add_header          Cache-Control "public, immutable";
        }

        # Everything else → frontend
        location / {
            proxy_pass          http://frontend;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
        }
    }
}
