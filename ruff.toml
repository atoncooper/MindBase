# Ruff configuration - pin the lint rule set so CI is stable across ruff
# versions. Only pycodestyle errors (E4/E7/E9) + pyflakes (F) are enabled;
# broader rules (B/I/UP/SIM) are deliberately OFF because the existing
# codebase has many violations under them - enable incrementally later.
#
# CI runs: ruff check app/ --ignore E501,E402  (this config makes the
# --ignore redundant but harmless, and pins select so a newer ruff with a
# wider default rule set does not suddenly fail CI).

target-version = "py310"

[lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E501", "E402"]

[lint.per-file-ignores]
"app/test/**" = ["F401", "E402"]
"app/test/eval/**" = ["F401", "E402", "F811"]
